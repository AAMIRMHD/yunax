name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend deps
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Install server deps
        run: npm ci
        working-directory: server
      - name: Run server tests
        run: npm test
        working-directory: server
